name: R package checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: R ${{ matrix.r }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            r: '4.4.3'
          - os: ubuntu-latest
            r: '4.5.3'
          - os: ubuntu-latest
            r: '4.6.1'
          - os: windows-latest
            r: '4.6.1'
          - os: macos-latest
            r: '4.6.1'

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Build source package
        shell: bash
        run: R CMD build --no-build-vignettes --no-manual .

      - name: Check source package
        shell: bash
        run: R CMD check --no-manual --no-vignettes biomastats_*.tar.gz
